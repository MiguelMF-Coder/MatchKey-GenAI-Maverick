version: "3.9"

services:
  db:
    image: postgres:16
    container_name: matchkey-db
    environment:
      POSTGRES_DB: matchkey
      POSTGRES_USER: matchkey_user
      POSTGRES_PASSWORD: matchkey_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchkey_user -d matchkey"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchkey-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: matchkey
      DB_USER: matchkey_user
      DB_PASSWORD: matchkey_password
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: matchkey-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"

volumes:
  db_data:
